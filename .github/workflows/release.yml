name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rmcp-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rmcp-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rmcp-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rmcp-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/rmcp ${{ matrix.artifact_name }}

      - name: Prepare Artifact (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/rmcp.exe ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
